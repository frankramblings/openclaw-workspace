<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>__AGENT_NAME__ Workspace</title>
  <meta name="theme-color" content="#15161a" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

  <!-- PWA: installable on iOS (Add to Home Screen) and desktop Chromium/Helium. -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- black-translucent paints under the status bar; mobile.css already pads via
       env(safe-area-inset-*), so content stays clear of the clock. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="__AGENT_NAME__" />
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=gary4" />

  <link rel="stylesheet" href="/static/redesign.css" />
  <link rel="stylesheet" href="/static/chat-window-redesign.css" />
  <link rel="stylesheet" href="/static/js/redesign/mobile/mobile.css" />
  <link rel="stylesheet" href="/static/css/task-rows.css" />
  <link rel="stylesheet" href="/static/css/chat-strip.css" />
  <!-- Native shell detection: see /static/js/native-shell.js -->
  <script src="/static/js/native-shell.js"></script>
</head>
<body>
  <!-- Fortress crystals boot loader — shown while #oc-root is hidden during
       boot; app.js fades it out on reveal. Markup namespaced from the classic
       UI's fortress-loading-48.svg (fl-* animation CSS in redesign.css). -->
  <div id="app-loader">
    <svg class="fl-svg" viewBox="0 0 48 48" width="88" height="88" role="img" aria-label="Loading">
      <ellipse cx="24" cy="38.5" rx="15" ry="3.5" fill="currentColor" opacity=".14"/>
      <g stroke-linejoin="round">
        <path class="fl-crystal fl-c1" d="M23.6 38 L20.8 16 L24 6 L27.2 16 L24.4 38 Z" fill="currentColor" fill-opacity=".82" stroke="currentColor" stroke-opacity="1" stroke-width=".9"/>
        <path class="fl-crystal fl-c2" d="M17.5 38 L15.2 23 L18.4 12 L21.1 26 L20 38 Z" fill="currentColor" fill-opacity=".62" stroke="currentColor" stroke-opacity=".9" stroke-width=".8"/>
        <path class="fl-crystal fl-c3" d="M29 38 L27.4 25 L31.5 10 L34.4 24 L32.4 38 Z" fill="currentColor" fill-opacity=".62" stroke="currentColor" stroke-opacity=".9" stroke-width=".8"/>
        <path class="fl-crystal fl-c4" d="M12.7 39 L11.5 29 L14.6 20 L17 31 L16 39 Z" fill="currentColor" fill-opacity=".44" stroke="currentColor" stroke-opacity=".74" stroke-width=".75"/>
        <path class="fl-crystal fl-c5" d="M35.2 39 L33.7 30 L37.6 19 L40.1 31 L38.7 39 Z" fill="currentColor" fill-opacity=".44" stroke="currentColor" stroke-opacity=".74" stroke-width=".75"/>
        <path class="fl-crystal fl-c6" d="M20.3 39 L19.3 28 L22.1 19 L24.2 30 L23.2 39 Z" fill="currentColor" fill-opacity=".7" stroke="currentColor" stroke-opacity=".82" stroke-width=".65"/>
        <path class="fl-crystal fl-c7" d="M26.5 39 L25.8 29 L28.3 18 L30.7 30 L29.5 39 Z" fill="currentColor" fill-opacity=".7" stroke="currentColor" stroke-opacity=".82" stroke-width=".65"/>
      </g>
      <g fill="currentColor">
        <path class="fl-shard fl-s1" style="--dx:-8px;--dy:-12px" d="M15 18 l2 -3 l1 4 z"/>
        <path class="fl-shard fl-s2" style="--dx:9px;--dy:-15px" d="M32 16 l3 -2 l-1 4 z"/>
        <path class="fl-shard fl-s3" style="--dx:2px;--dy:-18px" d="M24 11 l2 -2 l1 3 z"/>
      </g>
    </svg>
  </div>
  <div id="oc-root"></div>
  <script type="module" src="/static/js/redesign/app.js"></script>
  <script type="module" src="/static/js/dualDragInit.js"></script>
  <!-- AGPL-3.0 source offer is rendered by the redesign shell itself (rail on
       desktop, More drawer on mobile) — see renderRail()/mMore(). The floating
       source-link.js pill is only used by the classic UI (#hermes-footer). -->
  <!-- Service worker registration: see /static/js/sw-register.js -->
  <script src="/static/js/sw-register.js"></script>
</body>
</html>
