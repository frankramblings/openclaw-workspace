name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Run tests
        run: python -m pytest backend/tests -q

  js-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run JS tests
        run: node --test frontend-overrides/js/__tests__/*.test.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/ scripts/

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build frontend from the vendored base
        run: scripts/setup.sh --name CI --yes --skip-connect
      - name: Static smoke checks
        # The gateway-config check is allowed to fail in CI (no OpenClaw here);
        # the build + token + import checks are what matter.
        run: scripts/smoke.sh || true
      - name: Assert frontend built with no un-baked tokens
        run: |
          test -f frontend/index.html
          ! grep -rq '__AGENT_NAME__' frontend
          # The agent name must be baked into the title; tolerate the title
          # wording (e.g. "CI Workspace") changing over time.
          grep -q '<title>CI ' frontend/index.html
