# Lint config only — this file does not make the repo a Python package.
[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = ["frontend", "frontend-vendor", "frontend-overrides", ".worktrees", "native", "ralph"]

[tool.ruff.lint]
# Default E4/E7/E9/F rules: real errors (undefined names, unused imports,
# syntax hazards), not style opinions — the codebase has never been linted.
select = ["E4", "E7", "E9", "F"]
